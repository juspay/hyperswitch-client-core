<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>HyperSwitch Web Demo</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }
      #app-root {
        display: flex;
        flex-direction: row;
        justify-content: center;
        flex: 1 1 100%;
        height: 100vh;
      }
      .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        gap: 12px;
      }
      .btn {
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease,
          background 0.2s ease;
        box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
        min-width: 320px;
        text-align: center;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%);
      }
      .btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
      }
      .btn-secondary {
        background: #fff;
        color: #4f46e5;
        border: 2px solid #4f46e5;
        box-shadow: 0 4px 14px rgba(79, 70, 229, 0.1);
      }
      .btn-secondary:hover {
        background: #f5f3ff;
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.2);
      }
      #result {
        width: 320px;
        min-height: 80px;
        max-height: 200px;
        overflow: auto;
        background: #f6f8f9;
        border-radius: 8px;
        padding: 12px;
        font-family: monospace;
        font-size: 11px;
        white-space: pre-wrap;
        word-break: break-word;
        box-sizing: border-box;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        color: #767676;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 4px;
      }
    </style>
  </head>

  <body>
    <div id="app-root">
      <div class="controls">
        <div id="status">
          <pre id="result"></pre>
        </div>

        <!-- Step 1: Initialize -->
        <div class="section-label">Step 1 — Initialize</div>
        <button class="btn" onClick="window.initHyperswitch()">
          Reload Client and Initialize Hyperswitch
        </button>

        <!-- Step 2: Payment Sheet -->
        <div class="section-label">Step 2a — Payment Sheet</div>
        <button class="btn" onClick="window.presentPaymentSheet()">
          Present Payment Sheet
        </button>

        <!-- Step 2: Headless -->
        <div class="section-label">Step 2b — Headless</div>
        <button class="btn btn-secondary" onClick="window.getSavedMethods()">
          Get Saved Methods
        </button>

        <!-- Step 2: Elements -->
        <div class="section-label">Step 2c — Elements (Embedded)</div>
        <button class="btn btn-secondary" onClick="window.initElements()">
          Init Card Element
        </button>
        <div id="card-container" style="width:320px;height:600px;border:1px solid #e0e0e0;border-radius:8px;display:none;"></div>

        <!-- Step 3: Confirm -->
        <div class="section-label">Step 3 — Confirm</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
          <button class="btn btn-secondary" style="min-width:150px;" onClick="window.confirmWithDefault()">
            Default
          </button>
          <button class="btn btn-secondary" style="min-width:150px;" onClick="window.confirmWithLastUsed()">
            Last Used
          </button>
          <button class="btn btn-secondary" style="min-width:150px;" onClick="window.confirmElement()">
            Confirm Element
          </button>
        </div>
      </div>
    </div>
    <script src="/hyperswitch-lite-sdk.js"></script>
  </body>
</html>
